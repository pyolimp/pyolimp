name: CI

on:
  push:
    branches: [ "main" ]
    tags:
      - v*
  pull_request:
    branches: [ "main" ]

jobs:
  main:
    name: Run PyOlimp Tests
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - uses: psf/black@25.1.0
      - name: free disk space
        # cleanup idea from
        # https://github.com/jlumbroso/free-disk-space/blob/main/action.yml
        run: |
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /var/cache/apt/archives \
            /var/lib/apt/lists/*. \
            /opt/ghc \
            /usr/local/.ghcup \
            || true
      - run: pip install -e .
      - run: python -m unittest -v
      - run: python -m olimp.precompensation.nn.train.train --update-schema
